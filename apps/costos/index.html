<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shakeaholic · Tablero de Costos e Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#193b2d; --green-d:#0f2a1f; --green-2:#2c5a3f; --green-3:#356b49;
    --cream:#dfedca; --cream-2:#e7f4d0; --paper:#f4f8ee; --card:#ffffff;
    --ink:#15281d; --muted:#6f8174; --line:#dce7d2; --accent:#8fbe6a;
    --bad:#b23b2e; --bad-bg:#f6dad5; --warn:#a9760b; --warn-bg:#f7ead0; --ok:#2f7d3a; --ok-bg:#d6eccf;
    --display:"Fredoka",system-ui,sans-serif; --body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);font-size:14px}
  #auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 50% -10%,var(--green-2),var(--green-d))}
  .auth-card{width:100%;max-width:380px;background:var(--card);border-radius:22px;padding:30px 26px;box-shadow:0 18px 50px rgba(0,0,0,.32)}
  .auth-card .top{text-align:center;margin-bottom:22px}
  .auth-card img{width:78px;height:78px;border-radius:20px;box-shadow:0 0 0 3px var(--accent);margin-bottom:12px}
  .auth-card .brand{font-family:var(--display);font-weight:700;font-size:22px;color:var(--green);letter-spacing:.5px}
  .auth-card .brand span{color:var(--accent)}
  .auth-card .tag{font-size:11px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-top:3px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--green);margin-bottom:5px}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit}
  .field input:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  .auth-btn{width:100%;background:var(--green);color:var(--cream);border:0;border-radius:11px;padding:12px;font-family:var(--display);font-weight:600;font-size:15px;cursor:pointer;margin-top:4px}
  .auth-btn:hover{background:var(--green-2)}
  .auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
  .auth-switch a{color:var(--green);font-weight:600;cursor:pointer;text-decoration:underline}
  .auth-msg{font-size:12.5px;margin-top:12px;padding:9px 11px;border-radius:9px;display:none}
  .auth-msg.err{display:block;background:var(--bad-bg);color:var(--bad)} .auth-msg.ok{display:block;background:var(--ok-bg);color:var(--ok)}
  .auth-note{font-size:10.5px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.5}
  header{background:linear-gradient(135deg,var(--green) 0%,var(--green-d) 100%);color:var(--cream);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;box-shadow:0 2px 14px rgba(15,42,31,.18)}
  header img.logo{width:44px;height:44px;border-radius:13px;object-fit:cover;box-shadow:0 0 0 2px var(--accent)}
  header .brand{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.5px;line-height:1;color:var(--cream)}
  header .brand span{color:var(--accent)}
  header .sub{font-size:11px;opacity:.8;margin-top:3px;letter-spacing:.3px}
  header .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  header .saved{font-size:11px;background:rgba(143,190,106,.18);border:1px solid rgba(143,190,106,.4);padding:5px 11px;border-radius:20px;color:var(--cream-2);white-space:nowrap}
  header .userchip{font-size:12px;color:var(--cream-2);opacity:.85}
  header .logout{background:transparent;border:1px solid rgba(223,237,202,.4);color:var(--cream);border-radius:9px;padding:6px 11px;cursor:pointer;font-size:12px;font-weight:600}
  header .logout:hover{background:rgba(255,255,255,.1)}
  nav{display:flex;gap:5px;overflow-x:auto;background:var(--green-2);padding:8px 14px;position:sticky;top:74px;z-index:19;scrollbar-width:thin}
  nav button{background:transparent;border:0;color:var(--cream);opacity:.72;padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--display);white-space:nowrap}
  nav button:hover{opacity:1;background:rgba(255,255,255,.08)} nav button.active{background:var(--cream);color:var(--green);opacity:1}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 20px;background:#fff;border-bottom:1px solid var(--line)} .toolbar .sp{flex:1}
  main{padding:22px 20px 70px;max-width:1280px;margin:0 auto}
  h2{font-family:var(--display);font-size:22px;font-weight:700;margin:0 0 2px;color:var(--green)}
  .hint{color:var(--muted);font-size:12.5px;margin:0 0 16px;max-width:820px;line-height:1.5}
  .scroll{overflow:auto;border:1px solid var(--line);border-radius:14px;background:var(--card);max-height:72vh}
  table{border-collapse:separate;border-spacing:0;width:100%;background:var(--card)}
  th,td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;white-space:nowrap}
  th{background:var(--green);color:var(--cream);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:4}
  tr:last-child td{border-bottom:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:nth-child(even){background:var(--paper)} tbody tr:hover{background:#eef5e6}
  td.sticky,th.sticky{position:sticky;left:0;z-index:3;background:var(--green);color:var(--cream)}
  th.sticky{z-index:5}
  td.sticky{background:#fff;color:var(--ink);font-weight:600;border-right:2px solid var(--line)}
  tbody tr:nth-child(even) td.sticky{background:var(--paper)}
  input,select{font:inherit;border:1px solid var(--line);border-radius:8px;padding:6px 7px;background:#fff;width:100%;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  input.n{text-align:right;font-variant-numeric:tabular-nums}
  .w-tx{min-width:120px}.w-sm{min-width:78px}.w-dt{min-width:140px}.w-md{min-width:100px}
  .derived{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .pill{padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums;display:inline-block}
  .pill.bad{background:var(--bad-bg);color:var(--bad)} .pill.warn{background:var(--warn-bg);color:var(--warn)} .pill.ok{background:var(--ok-bg);color:var(--ok)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(25,59,45,.04);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .card .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .card .v{font-family:var(--display);font-size:26px;font-weight:700;margin-top:5px;font-variant-numeric:tabular-nums;color:var(--green)}
  .card .v small{font-size:13px;font-weight:600;color:var(--muted)}
  .params{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;max-width:1000px}
  .params label{display:block;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
  .params .lbl{font-size:12px;color:var(--green);font-weight:600;margin-bottom:7px;display:block}
  .params .desc{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.4}
  .recipe{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:15px;overflow:hidden;box-shadow:0 1px 2px rgba(25,59,45,.04)}
  .recipe .strip{background:var(--green);height:5px} .recipe .inner{padding:15px}
  .recipe-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .recipe-head .code{font-family:var(--display);font-weight:700;font-size:12px;background:var(--cream);color:var(--green);border:0;border-radius:8px;padding:6px 8px;width:110px;text-align:center}
  .recipe-head .name{font-family:var(--display);font-weight:600;font-size:16px;flex:1;min-width:150px;border:0;border-bottom:1px dashed var(--line);border-radius:0;background:transparent;color:var(--green)}
  .recipe-head .name:focus{outline:0;border-bottom-color:var(--accent)}
  .ing-row{display:grid;grid-template-columns:1fr 78px 28px 80px 30px;gap:8px;margin-bottom:8px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:7px 9px}
  .ing-row .c{font-size:13px;font-weight:700;color:var(--green);text-align:right;font-variant-numeric:tabular-nums}
  .ing-row .ing-u{font-size:11px;text-align:center}
  .ing-empty{font-size:12.5px;color:var(--muted);padding:12px;text-align:center;border:1px dashed var(--line);border-radius:10px;background:var(--paper)}
  .ivachk{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);background:var(--cream);border:1px solid var(--accent);border-radius:10px;padding:9px 12px;cursor:pointer;font-weight:600;user-select:none}
  .ivachk input{width:16px;height:16px;accent-color:var(--green);cursor:pointer}
  .ivapanel{display:flex;gap:10px;flex-wrap:wrap;margin-top:11px}
  .ivapanel .ivc{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 12px}
  .ivapanel .ivt{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .ivapanel .ivv{font-family:var(--display);font-size:15px;font-weight:600;color:var(--green);margin-top:2px;font-variant-numeric:tabular-nums}
  .xbtn{background:var(--bad-bg);color:var(--bad);border:0;border-radius:7px;cursor:pointer;font-weight:700;padding:6px 0}
  .totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:10px;margin-top:14px;padding:13px;border-radius:12px;background:var(--paper)}
  .totals .t{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .totals .tv{font-family:var(--display);font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--green);margin-top:2px}
  .btn{background:var(--green);color:var(--cream);border:0;border-radius:10px;padding:9px 15px;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--display)}
  .btn:hover{background:var(--green-2)}
  .btn.ghost{background:#fff;color:var(--green);border:1.5px solid var(--line)} .btn.ghost:hover{border-color:var(--accent);background:var(--paper)}
  .btn.mini{padding:5px 11px;font-size:12px} .btn.warn{color:var(--bad);border-color:var(--bad-bg)}
  .btn.tr{background:var(--accent);color:#143020;padding:5px 9px;font-size:12px;white-space:nowrap}
  .row-actions{display:flex;gap:6px;margin-top:12px}
  .muted{color:var(--muted)} .b{font-weight:700}
  .legend{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.5}
  .tag2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--cream);color:var(--green);padding:3px 8px;border-radius:6px}
  .addbar{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .sech{font-family:var(--display);color:var(--green);font-size:16px;font-weight:700;margin:22px 0 8px}
  .info{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--cream);color:var(--green);font-size:10px;font-weight:700;font-style:italic;font-family:Georgia,serif;cursor:pointer;margin-left:5px;border:1px solid var(--accent);vertical-align:middle;line-height:1}
  .info:hover{background:var(--accent)}
  .infobody{font-size:13px;line-height:1.7;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px}
  .infobody b{color:var(--green)}
  .exist{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-end;background:var(--cream);border:1px solid var(--accent);border-radius:11px;padding:10px 12px;margin:8px 0 12px}
  .exist .ivt{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  .exist .ivv{font-family:var(--display);font-size:18px;font-weight:700;color:var(--green)}
  .po-row{display:flex;gap:6px;align-items:center;margin:7px 0;flex-wrap:wrap}
  .po-row .rinde{font-size:11px;color:var(--muted);min-width:58px}
  .icard{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 2px rgba(25,59,45,.04)}
  .icard-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:11px 14px;background:var(--paper);border-bottom:1px solid var(--line)}
  .icard-head .iname{font-family:var(--display);font-weight:600;font-size:16px;flex:1;min-width:150px;border:0;border-bottom:1px dashed var(--line);background:transparent;color:var(--green);border-radius:0;padding:4px 2px}
  .icard-head .iname:focus{outline:0;border-bottom-color:var(--accent)}
  .icard-head .icode{font-family:var(--display);font-weight:700;font-size:12px;background:var(--cream);color:var(--green);border:0;border-radius:8px;padding:6px 8px;width:104px;text-align:center}
  .icard-acts{display:flex;gap:6px;flex-wrap:wrap}
  .icard-body{padding:13px 14px}
  .igroup{margin-bottom:13px}.igroup:last-child{margin-bottom:0}
  .gtitle{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--green);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .gtitle::after{content:"";flex:1;height:1px;background:var(--line)}
  .ifields{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px}
  .fld{display:flex;flex-direction:column;gap:3px;min-width:0}
  .fld>span{font-size:10.5px;color:var(--muted);font-weight:600}
  .fld.der{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:6px 9px;justify-content:center}
  .fld.der .dv{font-family:var(--display);font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;font-size:14px;display:flex;align-items:center}
  .fld .urow{display:flex;align-items:center;gap:6px}.fld .urow small{color:var(--muted);font-size:11px}
  .ingsearch{width:100%;max-width:340px;margin:0 0 14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .protctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .protctrls select{max-width:210px}
  .btn.on{background:var(--accent);color:var(--green);border-color:var(--accent)}
  tr.dragging{opacity:.35}
  tr.drop-t td{box-shadow:inset 0 2px 0 0 var(--accent)}
  .icard.drop-t{box-shadow:inset 0 3px 0 0 var(--accent)}
  .icard.dragging{opacity:.35}
  .draghandle{cursor:grab;font-size:14px;line-height:1;color:var(--muted)}
  .draghandle:active{cursor:grabbing}
  .printhead{display:none;font-weight:700;color:var(--green);font-size:15px;margin:4px 0 12px;font-family:var(--display)}
  .buyctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 14px}
  .grandtot{margin-left:auto;font-size:14px;color:var(--green)}
  .buygroup{margin-bottom:16px}
  .buyhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--display);font-weight:700;color:var(--green);font-size:14px;padding:8px 4px;border-bottom:2px solid var(--accent);margin-bottom:6px}
  .buyhead .buysub{margin-left:auto;background:var(--cream);border:1px solid var(--accent);border-radius:8px;padding:3px 10px;font-size:13px}
  .buyc{background:#fffbe9;border-color:var(--accent)!important;font-weight:700}
  td.lowc{color:var(--bad);font-weight:700}
  .invsession{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0 14px}
  .sessbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .invconteo{background:#fffbe9;border-color:var(--accent)!important}
  .eline{display:flex;gap:6px;align-items:center;margin:7px 0;flex-wrap:wrap}
  .ealert{font-size:11px;color:var(--muted);min-width:62px}
  .ealert.hi{color:var(--bad);font-weight:700}
  .kxup{color:var(--bad);font-weight:700}
  .kxtag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px}
  .kxtag.compra{background:#e6f0d8;color:var(--green)} .kxtag.traspaso{background:#e9eefb;color:#3a52a8} .kxtag.ajuste{background:#fdeecf;color:#9a6b12} .kxtag.salida{background:#fbe2e2;color:#9a2b2b}
  .kxgen{display:flex;flex-wrap:wrap;gap:8px 16px;font-size:12px;margin:6px 0 12px;color:var(--ink)}
  .kxgen b{color:var(--green)}
  @media print{
    header,nav,.toolbar,.addbar,.legend,.no-print,.seg,.filterbar,.sessbtns,.cards{display:none!important}
    #main{padding:0!important} #app{display:block!important}
    .scroll{max-height:none!important;overflow:visible!important;border:0!important}
    body,#app{background:#fff!important}
    .printhead{display:block!important}
    table{font-size:11px} .buygroup,.invsession{break-inside:avoid}
    .invsession{border:1px solid #999}
    .modal-bg{position:static!important;background:#fff!important;padding:0!important}
    .modal{box-shadow:none!important;max-width:none!important;border:0!important;max-height:none!important}
    .modal .mrow,.modal .mfield,.sub{display:none!important}
  }
  /* inventario */
  .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-bottom:14px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:var(--green);font-family:var(--display);font-weight:600;font-size:14px;padding:9px 16px;border-radius:9px;cursor:pointer;min-height:42px;transition:background .15s}
  .seg button.active{background:var(--green);color:var(--cream)}
  .seg button:hover:not(.active){background:var(--paper)}
  .filterbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .srch{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:0 12px;flex:1;min-width:220px}
  .srch span{color:var(--muted)} .srch input{border:0;padding:11px 0;background:transparent} .srch input:focus{outline:0}
  .filterbar select{max-width:240px;border-radius:12px;padding:11px 12px}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:14px;padding:34px;text-align:center;color:var(--muted)}
  .statecell{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}
  .btn.tr.rep{background:var(--warn);color:#3a2406}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,42,31,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}
  .modal{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .modal h3{font-family:var(--display);color:var(--green);margin:0 0 4px;font-size:19px}
  .modal .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .modal .mfield{margin-bottom:12px}
  .modal .mfield label{display:block;font-size:12px;font-weight:600;color:var(--green);margin-bottom:5px}
  .modal .preview{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:14px}
  .modal .preview b{color:var(--green)}
  .modal .merr{color:var(--bad);font-size:12.5px;margin-bottom:10px;display:none}
  .modal .mrow{display:flex;gap:8px;justify-content:flex-end}
  @media(max-width:640px){ header .brand{font-size:18px} header img.logo{width:38px;height:38px} main{padding:18px 12px 60px} .toolbar{padding:9px 14px} nav{top:70px} .ing-row{grid-template-columns:1fr 64px 24px 66px 26px;padding:6px 7px} }
</style>
</head>
<body>

async function sha256(t){t="shakeaholic::"+t;
  try{const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,"0")).join("");}
  catch(e){let h=0;for(let i=0;i<t.length;i++){h=(h<<5)-h+t.charCodeAt(i);h|=0;}return "f"+(h>>>0).toString(16);}}

async function doLogin(){const user=document.getElementById("li_user").value.trim(),pass=document.getElementById("li_pass").value;
  if(!user||!pass){authMsg("Escribe usuario y contraseña.","err");return;}
  if(!sb){authMsg("No hay conexión con la base de datos.","err");return;}
  authMsg("Verificando…","ok");
  const r=await sb.from('app_users').select('username,hash').ilike('username',user).limit(1);
  if(r.error){authMsg("Error de conexión. Revisa tu internet.","err");return;}
  const u=r.data&&r.data[0];
  if(u&&u.hash===await sha256(pass)){lsSet(SESS,{user:u.username});showApp(u.username);}
  else authMsg("Usuario o contraseña incorrectos.","err");}
async function doRegister(){const user=document.getElementById("rg_user").value.trim(),p1=document.getElementById("rg_pass").value,p2=document.getElementById("rg_pass2").value;
  if(!user||!p1){authMsg("Completa los campos.","err");return;} if(p1!==p2){authMsg("Las contraseñas no coinciden.","err");return;}
  if(!sb){authMsg("No hay conexión con la base de datos.","err");return;}
  const ex=await sb.from('app_users').select('username').ilike('username',user).limit(1);
  if(ex.data&&ex.data.length){authMsg("Ese usuario ya existe.","err");return;}
  const ins=await sb.from('app_users').insert({username:user,hash:await sha256(p1)});
  if(ins.error){authMsg("No se pudo crear el usuario.","err");return;}
  authMsg("Usuario creado. Ya puedes iniciar sesión.","ok");
  document.getElementById("regForm").style.display="none";document.getElementById("loginForm").style.display="block";document.getElementById("li_user").value=user;}
function wireAuth(){
  document.getElementById("li_btn").onclick=doLogin;document.getElementById("rg_btn").onclick=doRegister;
  document.getElementById("toReg").onclick=()=>{document.getElementById("loginForm").style.display="none";document.getElementById("regForm").style.display="block";authMsg("","");};
  document.getElementById("toLogin").onclick=()=>{document.getElementById("regForm").style.display="none";document.getElementById("loginForm").style.display="block";authMsg("","");};

function fill(arr,defs){(arr||[]).forEach(o=>{for(const k in defs)if(o[k]===undefined)o[k]=defs[k];});}
function migrate(s){
  if(!s||!s.params)return defaultState();
  s.params=Object.assign({foodCost:0.30,iva:0.16,merma:0.08,mano:0,clave:"1234",claveCompras:"1234"},s.params);
  fill(s.proteins,{codigo:"",proveedor:"",fechaCompra:"",fechaCaducidad:"",precioScoop:"",precioBote:"",invOriginal:"",minOriginal:"",invScoops:"",minScoops:""});
  (s.proteins||[]).forEach(p=>{if((p.invOriginal===""||p.invOriginal==null)&&p.stock)p.invOriginal=p.stock;});
  const idf={codigo:"",marca:"",proveedor:"",fechaCompra:"",fechaCaducidad:"",presCompra:"",porcionNombre:"",precioPorcion:"",gananciaPct:"",porcionQty:"",stockBase:"",equivPorciones:"",invOriginal:"",minOriginal:"",invPorcion:"",minPorcion:""};
  fill(s.shakeIngs,idf);fill(s.foodIngs,idf);
  [...(s.shakeIngs||[]),...(s.foodIngs||[])].forEach(it=>{if((it.invOriginal===""||it.invOriginal==null)&&it.stock)it.invOriginal=it.stock;});
  [...(s.shakeIngs||[]),...(s.foodIngs||[])].forEach(it=>{if(!Array.isArray(it.porciones))it.porciones=[];});
  fill(s.empaque,{codigo:"",proveedor:"",presentacion:"",ultimaCompra:"",stock:"",stockMin:""});
  const rd={codigo:"",proveedor:"",ultimaCompra:"",caducidad:"",costoCaja:"",costo:"",presOriginal:"",equivPiezas:"",invOriginal:"",minOriginal:"",invIndividual:"",minIndividual:""};
  fill(s.bebidas,rd);fill(s.snacks,rd);
  [...(s.bebidas||[]),...(s.snacks||[])].forEach(p=>{const pz=+p.equivPiezas||0;if((p.costoCaja===""||p.costoCaja==null)&&(+p.costo||0)>0&&pz>0)p.costoCaja=(+p.costo||0)*pz;const pz2=+p.equivPiezas||0;p.costo=pz2?(+p.costoCaja||0)/pz2:(+p.costo||0);});
  [...(s.proteins||[]),...(s.shakeIngs||[]),...(s.foodIngs||[]),...(s.bebidas||[]),...(s.snacks||[]),...(s.empaque||[])].forEach(it=>{if(!Array.isArray(it.kardex))it.kardex=[];});
  (s.shakeRecipes||[]).forEach((r,i)=>{if(r.codigo===undefined)r.codigo="Shake "+(i+1);});
  (s.foodRecipes||[]).forEach((r,i)=>{if(r.codigo===undefined)r.codigo="Alimento "+(i+1);});
  [...(s.shakeRecipes||[]),...(s.foodRecipes||[])].forEach(r=>{if(Array.isArray(r.ings))r.ings=r.ings.filter(p=>p&&p[0]);if(r.ivaIncluido===undefined)r.ivaIncluido=true;
    if(!Array.isArray(r.empaques))r.empaques=[];else r.empaques=r.empaques.filter(p=>p&&p[0]);});
  return s;
}

function protKey(p){return p.marca+" - "+p.sabor;}
/* ==== Reordenar genérico (↑ ↓ + arrastrar) para cualquier catálogo ==== */
let dragKey=null;
function reorderBtns(){return `<span class="draghandle" data-act="drag" title="Arrastrar para mover">⠿</span><div style="display:flex;flex-direction:column;gap:2px"><button class="btn mini ghost" data-act="up" title="Subir" style="padding:1px 6px;line-height:1">↑</button><button class="btn mini ghost" data-act="down" title="Bajar" style="padding:1px 6px;line-height:1">↓</button></div>`;}
function bindReorder(el,key,i){
  const arr=state[key];
  const up=el.querySelector('[data-act="up"]'),dn=el.querySelector('[data-act="down"]'),hd=el.querySelector('[data-act="drag"]');
  if(up)up.onclick=()=>{if(i>0){[arr[i-1],arr[i]]=[arr[i],arr[i-1]];save();render();}};
  if(dn)dn.onclick=()=>{if(i<arr.length-1){[arr[i],arr[i+1]]=[arr[i+1],arr[i]];save();render();}};
  if(!hd)return;
  hd.setAttribute("draggable","true");
  hd.addEventListener("dragstart",e=>{dragIndex=i;dragKey=key;e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain",String(i));}catch(_){}try{e.dataTransfer.setDragImage(el,12,12);}catch(_){}el.classList.add("dragging");});
  hd.addEventListener("dragend",()=>{el.classList.remove("dragging");document.querySelectorAll(".drop-t").forEach(x=>x.classList.remove("drop-t"));dragIndex=null;dragKey=null;});
  el.addEventListener("dragover",e=>{if(dragIndex===null||dragKey!==key)return;e.preventDefault();e.dataTransfer.dropEffect="move";document.querySelectorAll(".drop-t").forEach(x=>x.classList.remove("drop-t"));el.classList.add("drop-t");});
  el.addEventListener("drop",e=>{if(dragIndex===null||dragKey!==key)return;e.preventDefault();if(dragIndex!==i){const x=arr.splice(dragIndex,1)[0];arr.splice(i,0,x);dragIndex=null;dragKey=null;save();render();}});
}
function costPerScoop(p){const c=+p.costo,s=+p.scoops;return c&&s?c/s:0;}
function costPerUnit(i){const c=+i.cont,p=+i.costo;return c&&p?p/c:0;}
function costPortion(it){const q=+it.porcionQty,cu=costPerUnit(it);return q&&cu?q*cu:0;}
function pricePortion(it){const g=+it.gananciaPct||0;return costPortion(it)*(1+g/100);}
function porcPres(it){const c=+it.cont,q=+it.porcionQty;return c&&q?c/q:0;}
function infoIcon(html){return `<span class="info" data-info="${esc(html)}" title="¿De dónde sale?">i</span>`;}

  host.querySelector("#info_ok").onclick=()=>host.innerHTML="";
  host.querySelector(".modal-bg").onclick=ev=>{if(ev.target.classList.contains("modal-bg"))host.innerHTML="";};}

function ingCpu(it){const v=costPerUnit(it),u=it.unidad||"u";return fmtU(v)+infoIcon(`<b>Costo por ${u}</b><br>Costo de compra ÷ contenido<br>$${(+it.costo||0)} ÷ ${(+it.cont||0)} ${u} = <b>${fmtU(v)}</b> por ${u}`);}
function ingCpor(it){const q=+it.porcionQty||0,u=it.unidad||"u",cu=costPerUnit(it),v=costPortion(it);return fmt(v)+infoIcon(`<b>Costo por porción</b> (${q} ${u})<br>Porción × costo por ${u}<br>${q} ${u} × ${fmtU(cu)} = <b>${fmt(v)}</b>`);}
function ingPpres(it){const v=porcPres(it),u=it.unidad||"u";return num(Math.floor(v))+infoIcon(`<b>Porciones por presentación</b><br>Contenido ÷ porción<br>${(+it.cont||0)} ${u} ÷ ${(+it.porcionQty||0)} ${u} = <b>${num(Math.floor(v))}</b> porciones`);}
function ingPpor(it){const g=+it.gananciaPct||0,c=costPortion(it),v=pricePortion(it);return fmt(v)+infoIcon(`<b>Precio por porción</b><br>Costo por porción × (1 + % ganancia)<br>${fmt(c)} × (1 + ${g}%) = <b>${fmt(v)}</b>`);}
function findProt(key){return state.proteins.find(p=>protKey(p)===key);}
function findIng(list,name){return list.find(i=>i.nombre===name);}
function findEmp(name){return state.empaque.find(e=>e.nombre===name);}
/* Empaque por receta: SOLO se suman los empaques que esa receta tiene en
   su propio arreglo `empaques` (mismo patrón que `ings`). Nunca un combo
   global — ver docs/auditoria-costeo-empaques.md. */
function recipeEmpaqueCost(r){return (r.empaques||[]).reduce((a,[n,q])=>{const e=findEmp(n);return a+(e&&q?(+e.costo||0)*(+q||0):0);},0);}
function calcShake(r){let ins=0,prot=0;
  if(r.protein){const p=findProt(r.protein);if(p){prot=costPerScoop(p)*(+r.scoops||0);ins+=prot;}}
  (r.ings||[]).forEach(([n,q])=>{const i=findIng(state.shakeIngs,n);if(i&&q)ins+=costPerUnit(i)*(+q||0);});
  return finishCalc(ins,r,recipeEmpaqueCost(r),prot);}
function calcFood(r){let ins=0;(r.ings||[]).forEach(([n,q])=>{const i=findIng(state.foodIngs,n);if(i&&q)ins+=costPerUnit(i)*(+q||0);});
  return finishCalc(ins,r,recipeEmpaqueCost(r),0);}
function finishCalc(ins,r,empaque,prot){
  const merma=r.merma!==""&&r.merma!=null?(+r.merma)/((+r.merma)>1?100:1):state.params.merma;
  const conMerma=ins*(1+merma),total=conMerma+empaque+(+state.params.mano||0);
  const precio=+r.precio||0,iva=state.params.iva,inc=r.ivaIncluido!==false;
  const sinIva=inc?precio/(1+iva):precio, conIva=inc?precio:precio*(1+iva), ivaMonto=conIva-sinIva;
  const fc=sinIva?total/sinIva:0,margen=sinIva?sinIva-total:0,margenPct=sinIva?margen/sinIva:0;
  const sugerido=state.params.foodCost?(total/state.params.foodCost)*(1+iva):0;
  return {ins,merma,conMerma,empaque,total,precio,sinIva,conIva,ivaMonto,inc,fc,margen,margenPct,sugerido,prot,protShare:ins?prot/ins:0};}
function fcClass(fc){if(!fc)return"";return fc>0.4?"bad":fc>state.params.foodCost?"warn":"ok";}

  foodIngs:{label:"Ingredientes alimentos",name:i=>withMarca(i),orig:"invOriginal",origMin:"minOriginal",origUnit:"pres.",ind:"invPorcion",indMin:"minPorcion",indUnit:"porciones",equiv:i=>{const c=+i.cont,q=+i.porcionQty;return c&&q?Math.floor(c/q):0;},equivLbl:"porciones/pres.",cad:"fechaCaducidad"},
  bebidas:{label:"Bebidas",name:b=>withMarca(b),orig:"invOriginal",origMin:"minOriginal",origUnit:"cajas",ind:"invIndividual",indMin:"minIndividual",indUnit:"piezas",equiv:b=>+b.equivPiezas||0,equivLbl:"piezas/caja",cad:"caducidad"},
  snacks:{label:"Snacks/Treats",name:s=>withMarca(s),orig:"invOriginal",origMin:"minOriginal",origUnit:"cajas",ind:"invIndividual",indMin:"minIndividual",indUnit:"piezas",equiv:s=>+s.equivPiezas||0,equivLbl:"piezas/caja",cad:"caducidad"},
};
function low(v,min){const n=+v||0,m=+min||0;return m>0&&n<=m;}
function daysTo(d){if(!d)return null;const t=(new Date(d)-new Date())/86400000;return Math.ceil(t);}
function cadClass(d){const x=daysTo(d);if(x===null)return"";if(x<0)return"bad";if(x<=14)return"warn";return"";}

function openTraspaso(cat,i){
  const cfg=INV[cat],item=state[cat][i],eq=cfg.equiv(item),name=cfg.name(item);
  const host=document.getElementById("modalHost");
  host.innerHTML=`<div class="modal-bg"><div class="modal">
    <h3>Traspaso a kiosko</h3>
    <div class="sub">${esc(name)} · ${cfg.label}</div>
    <div class="mfield"><label>Presentaciones a pasar de bodega (${cfg.origUnit})</label><input class="n" id="tr_qty" value="1"></div>
    <div class="preview" id="tr_prev"></div>
    <div class="mfield"><label>Clave del encargado</label><input id="tr_clave" type="password" placeholder="••••"></div>
    <div class="merr" id="tr_err"></div>
    <div class="mrow"><button class="btn ghost mini" id="tr_cancel">Cancelar</button><button class="btn mini" id="tr_ok">Confirmar traspaso</button></div>
  </div></div>`;
  const qty=host.querySelector("#tr_qty"),prev=host.querySelector("#tr_prev"),err=host.querySelector("#tr_err");
  function upd(){const q=+qty.value||0;const disp=q*eq;
    prev.innerHTML= eq>0
      ? `Equivalencia: <b>${eq} ${cfg.indUnit}</b> por ${cfg.origUnit.replace(/s$/,'')}.<br>Bodega: ${num(item[cfg.orig])} → <b>${num((+item[cfg.orig]||0)-q)}</b> ${cfg.origUnit}<br>Kiosko: ${num(item[cfg.ind])} → <b>${num((+item[cfg.ind]||0)+disp)}</b> ${cfg.indUnit}`
      : `<span style="color:var(--bad)">Falta definir la equivalencia (${cfg.equivLbl}) de este producto en su catálogo.</span>`;}
  upd();qty.addEventListener("input",upd);
  host.querySelector("#tr_cancel").onclick=()=>host.innerHTML="";
  host.querySelector("#tr_ok").onclick=()=>{
    const q=+qty.value||0,clave=host.querySelector("#tr_clave").value;
    err.style.display="none";
    if(eq<=0){err.textContent="Define la equivalencia en el catálogo antes de traspasar.";err.style.display="block";return;}
    if(q<=0){err.textContent="Cantidad inválida.";err.style.display="block";return;}
    if((+item[cfg.orig]||0)<q){err.textContent="No hay suficientes "+cfg.origUnit+" en bodega.";err.style.display="block";return;}
    if(clave!==String(state.params.clave)){err.textContent="Clave incorrecta.";err.style.display="block";return;}
    item[cfg.orig]=(+item[cfg.orig]||0)-q;item[cfg.ind]=(+item[cfg.ind]||0)+q*eq;
    kardexPush(cat,i,{f:new Date().toISOString().slice(0,10),tipo:"traspaso",ent:0,sal:q,exist:+item[cfg.orig]||0,precio:"",cad:"",nota:"→ kiosko "+num(q*eq)+" "+cfg.indUnit});
    persist();host.innerHTML="";render();
  };
}

     <div class="card"><div class="k">Sobre la meta</div><div class="v" style="color:${over?'var(--bad)':'var(--ok)'}">${over}<small> / ${all.length}</small></div></div>
     <div class="card"><div class="k">Stock bajo</div><div class="v" style="color:${lowCount?'var(--bad)':'var(--ok)'}">${lowCount}</div></div>
     <div class="card"><div class="k">Caducidad próxima</div><div class="v" style="color:${cadCount?'var(--warn)':'var(--ok)'}">${cadCount}</div></div>
   </div>
   <h2 style="font-size:16px">Productos costeados</h2>
   <div class="scroll" style="margin-top:8px"><table><thead><tr><th>Item</th><th>Producto</th><th class="num">Costo</th><th class="num">Precio</th><th class="num">Food cost</th><th class="num">Margen $</th><th class="num">Margen %</th><th class="num">Precio ref.</th></tr></thead><tbody>
   ${all.length? all.sort((a,b)=>b.c.fc-a.c.fc).map(x=>`<tr><td class="muted">${esc(x.r.codigo||'')}</td><td>${esc(x.r.nombre)}</td><td class="num">${fmt(x.c.total)}</td><td class="num">${fmt(x.c.precio)}</td><td class="num"><span class="pill ${fcClass(x.c.fc)}">${pct(x.c.fc)}</span></td><td class="num">${fmt(x.c.margen)}</td><td class="num">${pct(x.c.margenPct)}</td><td class="num muted">${fmt(round5(x.c.sugerido))}</td></tr>`).join("")
     : `<tr><td colspan="8" class="muted">Aún no hay productos con precio.</td></tr>`}</tbody></table></div>
   <p class="legend">🟢 ≤ meta · 🟡 entre meta y 40% · 🔴 &gt; 40% de food cost. El <b>precio ref.</b> es orientativo; el precio de venta lo defines tú según tu mercado.</p>`;
}

function cpsCell(p){const v=costPerScoop(p);return fmtU(v)+infoIcon(`<b>Costo por scoop</b><br>Costo del bote ÷ scoops por bote<br>$${(+p.costo||0)} ÷ ${(+p.scoops||0)} = <b>${fmtU(v)}</b>`);}
function utilCell(p){const c=costPerScoop(p),v=(+p.precioScoop||0)-c;return fmtU(v)+infoIcon(`<b>Utilidad por scoop</b><br>Precio por scoop − costo por scoop<br>$${(+p.precioScoop||0)} − ${fmtU(c)} = <b>${fmtU(v)}</b>`);}

  return `<div class="ivc"><div class="ivt">Precio con IVA</div><div class="ivv">${fmt(c.conIva)}</div></div>`

function totBlocks(c){const I=(l,v,info)=>`<div><div class="t">${l}</div><div class="tv">${v}${info?infoIcon(info):""}</div></div>`;
  const mp=(c.merma*100).toFixed(2),ivap=(state.params.iva*100).toFixed(0),fcm=(state.params.foodCost*100).toFixed(0);

   +I("+ Merma",fmt(c.conMerma),`<b>Con merma</b><br>Insumos × (1 + merma)<br>${fmt(c.ins)} × (1 + ${mp}%) = <b>${fmt(c.conMerma)}</b>`)
   +I("+ Empaque",fmt(c.empaque),`<b>Empaque</b><br>Costo del combo de empaque marcado (vaso, tapa, popote, servilleta…).`)
   +I("Costo total",fmt(c.total),`<b>Costo total</b><br>Insumos con merma + empaque + mano de obra<br>${fmt(c.conMerma)} + ${fmt(c.empaque)} + ${fmt(+state.params.mano||0)} = <b>${fmt(c.total)}</b>`)
   +I("Food cost",`<span class="pill ${fcClass(c.fc)}">${pct(c.fc)}</span>`,`<b>Food cost</b><br>Costo total ÷ precio sin IVA<br>${fmt(c.total)} ÷ ${fmt(c.sinIva)} = <b>${pct(c.fc)}</b>`)
   +I("Margen $",fmt(c.margen),`<b>Margen</b><br>Precio sin IVA − costo total<br>${fmt(c.sinIva)} − ${fmt(c.total)} = <b>${fmt(c.margen)}</b>`)
   +I("Ref. "+pct(state.params.foodCost),`<span class="muted">${fmt(round5(c.sugerido))}</span>`,`<b>Precio de referencia</b><br>(Costo total ÷ meta de food cost) × (1 + IVA)<br>(${fmt(c.total)} ÷ ${fcm}%) × (1 + ${ivap}%) ≈ <b>${fmt(round5(c.sugerido))}</b><br>Solo referencia: tu precio de venta lo defines tú.`);}

function openPorciones(key,i){
  const it=state[key][i];
  if(!Array.isArray(it.porciones))it.porciones=[];
  const host=document.getElementById("modalHost");
  function draw(){
    const u=it.unidad||"u", stock=+it.stockBase||0;
    host.innerHTML=`<div class="modal-bg"><div class="modal">
      <h3>${esc(it.nombre)} · porciones y existencia</h3>
      <div class="sub">Un solo ingrediente con varias porciones (ej. Ensalada 80 ${u}, Sándwich 100 ${u}). Al <b>Descontar</b> una porción, baja del total de ${esc(it.nombre)}: cada porción por separado, pero del mismo stock.</div>
      <div class="exist">
        <div><div class="ivt">Existencia de ${esc(it.nombre)}</div><div class="ivv">${num(stock)} ${u}</div></div>
        <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap">
          <label><div class="t muted" style="font-size:10px">Cantidad (${u})</div><input class="n" id="po_in" style="width:96px" placeholder="ej. 1000"></label>
          <button class="btn mini" id="po_inbtn" title="Sumar a la existencia (entrada de compra)">+ Entrada</button>
          <button class="btn mini ghost" id="po_setbtn" title="Fijar la existencia exacta">Fijar</button>
        </div>
      </div>
      <div id="po_list"></div>
      <div class="mrow" style="justify-content:flex-start;margin-top:4px"><button class="btn ghost mini" id="po_add">+ Agregar porción</button></div>
      <div class="merr" id="po_err"></div>
      <div class="mrow"><button class="btn mini" id="po_close">Listo</button></div>
    </div></div>`;
    const list=host.querySelector("#po_list"), err=host.querySelector("#po_err");
    list.innerHTML = it.porciones.length ? it.porciones.map((po,j)=>{const c=+po.cant||0, rinde=c?Math.floor(stock/c):0; return `
      <div class="po-row">
        <input class="w-tx" data-pn="${j}" value="${esc(po.nombre)}" placeholder="Ensalada" style="flex:1;min-width:108px">
        <input class="n" data-pc="${j}" value="${esc(po.cant)}" placeholder="0" style="width:66px"><span class="muted" style="font-size:11px">${u}</span>
        <span class="rinde">rinde ${rinde}</span>
        <input class="n" data-use="${j}" style="width:50px" placeholder="#">
        <button class="btn mini" data-dis="${j}" title="Descontar de la existencia">Descontar</button>
        <button class="xbtn" data-pd="${j}" style="padding:6px 9px">✕</button>
      </div>`;}).join("") : `<div class="muted" style="font-size:12px;margin:8px 0">Aún no hay porciones. Agrega una (ej. “Ensalada” 80 ${u}).</div>`;
    list.querySelectorAll("[data-pn]").forEach(inp=>inp.addEventListener("input",e=>{it.porciones[+e.target.dataset.pn].nombre=e.target.value;save();}));
    list.querySelectorAll("[data-pc]").forEach(inp=>inp.addEventListener("input",e=>{it.porciones[+e.target.dataset.pc].cant=e.target.value;save();}));
    list.querySelectorAll("[data-pd]").forEach(b=>b.onclick=()=>{it.porciones.splice(+b.dataset.pd,1);save();draw();});
    list.querySelectorAll("[data-dis]").forEach(b=>b.onclick=()=>{const j=+b.dataset.dis,po=it.porciones[j],c=+po.cant||0,n=+host.querySelector(`[data-use="${j}"]`).value||0;
      err.style.display="none";
      if(c<=0){err.textContent="Define los "+u+" de esa porción primero.";err.style.display="block";return;}
      if(n<=0){err.textContent="¿Cuántas "+(po.nombre||"porciones")+" preparaste?";err.style.display="block";return;}
      const need=c*n, cur=+it.stockBase||0;
      if(need>cur){err.textContent="No alcanza: necesitas "+num(need)+" "+u+" y solo hay "+num(cur)+" "+u+".";err.style.display="block";return;}
      it.stockBase=cur-need;save();draw();});
    host.querySelector("#po_inbtn").onclick=()=>{const v=+host.querySelector("#po_in").value||0;if(v){it.stockBase=(+it.stockBase||0)+v;save();draw();}};
    host.querySelector("#po_setbtn").onclick=()=>{const el=host.querySelector("#po_in");if(el.value!==""){it.stockBase=+el.value||0;save();draw();}};
    host.querySelector("#po_add").onclick=()=>{it.porciones.push({nombre:"",cant:""});save();draw();};
    host.querySelector("#po_close").onclick=()=>{host.innerHTML="";render();};
    host.querySelector(".modal-bg").onclick=ev=>{if(ev.target.classList.contains("modal-bg")){host.innerHTML="";render();}};
  }
  draw();
}

  div.querySelectorAll("[data-f]").forEach(inp=>{const ev=(inp.tagName==="SELECT"||inp.type==="checkbox")?"change":"input";
    inp.addEventListener(ev,e=>{r[e.target.dataset.f]= e.target.type==="checkbox"? e.target.checked : e.target.value; save();updateTotals();});});
  div.querySelectorAll("[data-ing]").forEach(sel=>sel.addEventListener("change",e=>{const idx=+e.target.dataset.ing,val=e.target.value,pair=r.ings[idx];
    if(val.indexOf(sepP)>=0){const parts=val.split(sepP);pair[0]=parts[0];pair[2]=parts[1];const ing=findIng(ingList,parts[0]);const pp=ing&&(ing.porciones||[]).find(x=>x.nombre===parts[1]);if(pp){pair[1]=pp.cant;const ci=div.querySelectorAll("[data-cant]")[idx];if(ci)ci.value=pp.cant;}}
    else{pair[0]=val;pair[2]="";}
    const us=div.querySelectorAll('[data-u]')[idx];if(us){const ni=findIng(ingList,pair[0]);us.textContent=ni?ni.unidad:"";}
    save();updateTotals();updateLine(idx);}));
  div.querySelectorAll("[data-cant]").forEach(inp=>inp.addEventListener("input",e=>{r.ings[+e.target.dataset.cant][1]=e.target.value;save();updateTotals();updateLine(+e.target.dataset.cant);}));
  div.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{r.ings.splice(+b.dataset.rm,1);save();render();});
  div.querySelector('[data-act="adding"]').onclick=()=>{r.ings.push(["",""]);save();render();};
  div.querySelectorAll("[data-emp]").forEach(sel=>sel.addEventListener("change",e=>{const idx=+e.target.dataset.emp;r.empaques[idx][0]=e.target.value;save();updateTotals();updateEmpLine(idx);}));
  div.querySelectorAll("[data-empcant]").forEach(inp=>inp.addEventListener("input",e=>{r.empaques[+e.target.dataset.empcant][1]=e.target.value;save();updateTotals();updateEmpLine(+e.target.dataset.empcant);}));
  div.querySelectorAll("[data-emprm]").forEach(b=>b.onclick=()=>{r.empaques.splice(+b.dataset.emprm,1);save();render();});
  div.querySelector('[data-act="addingemp"]').onclick=()=>{r.empaques.push(["",""]);save();render();};
  div.querySelector('[data-act="del"]').onclick=()=>{if(confirm("¿Eliminar “"+r.nombre+"”?")){listRef.splice(ri,1);save();render();}};
  function updateLine(idx){const pair=r.ings[idx];const i=findIng(ingList,pair[0]);const lc=i&&pair[1]?costPerUnit(i)*(+pair[1]):0;
    ingsBox.querySelectorAll(".ing-row")[idx].querySelector(".c").textContent=lc?fmt(lc):"";}
  function updateEmpLine(idx){const pair=r.empaques[idx];const e=findEmp(pair[0]);const cu=e?(+e.costo||0):0,lc=e&&pair[1]?cu*(+pair[1]):0;
    const row=empBox.querySelectorAll(".ing-row")[idx];
    row.querySelector(`[data-empmarca="${idx}"]`).textContent=e&&e.marca?e.marca:"";
    row.querySelector(`[data-emppres="${idx}"]`).textContent=e&&e.presentacion?e.presentacion:"";
    row.querySelector(`[data-empcu="${idx}"]`).textContent=e?fmtU(cu):"";
    row.querySelector(`[data-empsub="${idx}"]`).textContent=lc?fmt(lc):"—";}
  function updateTotals(){const c=isShake?calcShake(r):calcFood(r);
    div.querySelector(".totals").innerHTML=totBlocks(c);
    const ivp=div.querySelector(".ivapanel");if(ivp)ivp.innerHTML=ivaPanel(c);
    const tg=div.querySelector(".tag2");if(tg)tg.textContent="Proteína: "+pct(c.protShare);}
  return div;
}

     <td class="sticky"><input class="w-tx" data-f="nombre" value="${esc(p.nombre)}" style="font-weight:600"></td>

     <td class="num derived" data-d="mp">${pct(mp)}${infoIcon(mpInfo)}</td>
     <td><input class="n w-sm" data-f="invOriginal" value="${esc(p.invOriginal)}"></td>

    tr.querySelector('[data-act="tr"]').onclick=()=>openTraspaso(key,i);

/* ---------------- INVENTARIO (bodega / kiosko) ---------------- */
const CATLABEL={proteins:"Proteínas",shakeIngs:"Ingred. shakes",foodIngs:"Ingred. alimentos",bebidas:"Bebidas",snacks:"Snacks"};
function invPres(cat,it){if(cat==="proteins")return it.pres?(it.pres+" g/bote"):"Bote";
  if(cat==="shakeIngs"||cat==="foodIngs")return it.presCompra||"Presentación";return it.presOriginal||"Caja";}
function presG(cat,it){
  if(cat==="proteins")return it.pres?esc(it.pres)+" g":'<span class="muted">—</span>';
  if(cat==="shakeIngs"||cat==="foodIngs")return it.cont?esc(it.cont)+" "+esc(it.unidad||""):'<span class="muted">—</span>';
  return esc(invPres(cat,it));}
function stockState(v,min){const n=+v||0,m=+min||0;
  if(n<=0)return{cls:"bad",txt:"Agotado"};if(m>0&&n<=m)return{cls:"warn",txt:"Bajo"};return{cls:"ok",txt:"OK"};}
function stateCell(v,min){const s=stockState(v,min);return `<span class="statecell"><span class="dot ${s.cls}"></span><span class="pill ${s.cls}">${s.txt}</span></span>`;}
function cadCell(d){if(!d)return '<span class="muted">—</span>';const dt=daysTo(d),c=cadClass(d)||"ok";return `<span class="pill ${c}">${dt<0?"Vencido":dt+" d"}</span>`;}
function collectInv(){let rows=[];Object.keys(INV).forEach(cat=>{if(invCat!=="all"&&invCat!==cat)return;const cfg=INV[cat];
  state[cat].forEach((it,i)=>{const name=cfg.name(it);
    if(invSearch){const q=invSearch.toLowerCase();if(!(name.toLowerCase().includes(q)||String(it.codigo||"").toLowerCase().includes(q)||String(it.codigoBarras||"").toLowerCase().includes(q)))return;}
    rows.push({cat,i,it,cfg,name});});});return rows;}

function renderInventario(m){
  state.invSesion=state.invSesion||{inicio:"",fin:"",firma:""};
  const ses=state.invSesion;
  m.innerHTML=`<h2>Inventario</h2>
   <p class="hint no-print"><b>Bodega</b> = mercancía en presentación original. <b>Kiosko</b> = lo disponible para venta individual o por porción. En <b>Bodega</b> y <b>Kiosko</b> tienes una columna <b>Conteo</b> editable para el inventario físico, con su diferencia contra el sistema. Traspasa de bodega a kiosko con la clave del encargado.</p>
   <div class="printhead">📋 Inventario físico · Shakeaholic · ${new Date().toLocaleDateString("es-MX")}</div>
   <div class="invsession">
     <div class="gtitle" style="margin-bottom:8px">📋 Sesión de inventario físico</div>
     <div class="ifields" style="grid-template-columns:repeat(auto-fill,minmax(210px,1fr))">
       <label class="fld"><span>Inicio (fecha y hora)</span><div class="urow"><input type="datetime-local" id="sesIni" value="${esc(ses.inicio)}"><button class="btn mini ghost no-print" id="sesIniNow">Ahora</button></div></label>
       <label class="fld"><span>Término (fecha y hora)</span><div class="urow"><input type="datetime-local" id="sesFin" value="${esc(ses.fin)}"><button class="btn mini ghost no-print" id="sesFinNow">Ahora</button></div></label>
       <label class="fld"><span>Firma (responsable del conteo)</span><input id="sesFirma" value="${esc(ses.firma)}" placeholder="Nombre de quien cuenta"></label>
     </div>
     <div class="sessbtns"><button class="btn no-print" id="invPrint">🖨 Imprimir conteo</button><button class="btn ghost no-print" id="invApply">✓ Aplicar conteo a existencias</button></div>
   </div>
   <div class="seg" id="invSeg" role="tablist">
     <button data-v="todos" class="${invView==="todos"?"active":""}">Todos</button>
     <button data-v="bodega" class="${invView==="bodega"?"active":""}">🏬 Bodega</button>
     <button data-v="kiosko" class="${invView==="kiosko"?"active":""}">🛒 Kiosko</button>
   </div>
   <div class="filterbar">
     <div class="srch"><span>🔎</span><input id="invSearch" placeholder="Buscar por nombre o código…" value="${esc(invSearch)}" aria-label="Buscar producto"></div>
     <select id="invCat" aria-label="Filtrar por categoría">
       <option value="all" ${invCat==="all"?"selected":""}>Todas las categorías</option>
       ${Object.keys(CATLABEL).map(c=>`<option value="${c}" ${invCat===c?"selected":""}>${CATLABEL[c]}</option>`).join("")}
     </select>
   </div>
   <div id="invBody"></div>`;
  const seg=m.querySelector("#invSeg");
  seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{invView=b.dataset.v;seg.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b));paintInv();});
  m.querySelector("#invSearch").addEventListener("input",e=>{invSearch=e.target.value;paintInv();});
  m.querySelector("#invCat").addEventListener("change",e=>{invCat=e.target.value;paintInv();});
  m.querySelector("#sesIni").addEventListener("input",e=>{ses.inicio=e.target.value;save();});
  m.querySelector("#sesFin").addEventListener("input",e=>{ses.fin=e.target.value;save();});
  m.querySelector("#sesFirma").addEventListener("input",e=>{ses.firma=e.target.value;save();});
  m.querySelector("#sesIniNow").onclick=()=>{ses.inicio=nowLocal();m.querySelector("#sesIni").value=ses.inicio;save();};
  m.querySelector("#sesFinNow").onclick=()=>{ses.fin=nowLocal();m.querySelector("#sesFin").value=ses.fin;save();};
  m.querySelector("#invPrint").onclick=()=>window.print();
  m.querySelector("#invApply").onclick=()=>{if(!confirm("¿Aplicar el conteo capturado a las existencias? Sobrescribe el stock del sistema con lo contado en Bodega y Kiosko."))return;
    Object.keys(INV).forEach(cat=>state[cat].forEach((it,i)=>{const cfg=INV[cat],f=new Date().toISOString().slice(0,10);
      if(it.conteoBodega!==undefined&&it.conteoBodega!==""){it[cfg.orig]=+it.conteoBodega||0;kardexPush(cat,i,{f,tipo:"ajuste",ent:0,sal:0,exist:+it[cfg.orig]||0,precio:"",cad:"",nota:"Conteo físico (bodega)"});}
      if(it.conteoKiosko!==undefined&&it.conteoKiosko!==""){it[cfg.ind]=+it.conteoKiosko||0;kardexPush(cat,i,{f,tipo:"ajuste",ent:0,sal:0,exist:+it[cfg.ind]||0,precio:"",cad:"",nota:"Conteo físico (kiosko)"});}}));
    save();render();};
  paintInv();
}
function kpis(arr){
  let total=arr.length,bajo=0,agot=0,cad=0;
  arr.forEach(({it,cfg})=>{
    const so=stockState(it[cfg.orig],it[cfg.origMin]),si=stockState(it[cfg.ind],it[cfg.indMin]);
    let st="ok"; if(invView==="bodega")st=so.cls; else if(invView==="kiosko")st=si.cls; else st=(so.cls==="bad"||si.cls==="bad")?"bad":(so.cls==="warn"||si.cls==="warn")?"warn":"ok";
    if(st==="bad")agot++; else if(st==="warn")bajo++;
    if(cadClass(it[cfg.cad]))cad++;
  });
  return `<div class="cards">
    <div class="card"><div class="k">Productos</div><div class="v">${total}</div></div>
    <div class="card"><div class="k">Stock bajo</div><div class="v" style="color:${bajo?"var(--warn)":"var(--ok)"}">${bajo}</div></div>
    <div class="card"><div class="k">Agotados</div><div class="v" style="color:${agot?"var(--bad)":"var(--ok)"}">${agot}</div></div>
    <div class="card"><div class="k">Por caducar / vencidos</div><div class="v" style="color:${cad?"var(--warn)":"var(--ok)"}">${cad}</div></div>
  </div>`;
}
function paintInv(){
  const body=document.getElementById("invBody");if(!body)return;
  const rows=collectInv();
  if(!rows.length){body.innerHTML=kpis(rows)+`<div class="empty">No hay productos que coincidan con la búsqueda o el filtro.</div>`;return;}
  let head,bodyRows;
  if(invView==="bodega"){
    head=`<th class="sticky">Producto</th><th>Categoría</th><th>Clave</th><th>Pres(g)</th><th class="num">En bodega</th><th class="num">Mín</th><th class="num">Conteo</th><th class="num">Dif.</th><th>Estado</th><th>Caducidad</th><th>Acción</th>`;
    bodyRows=rows.map(({cat,i,it,cfg,name})=>`<tr data-cat="${cat}" data-i="${i}">
      <td class="sticky">${esc(name)}</td><td class="muted">${CATLABEL[cat]}</td><td class="muted">${esc(it.codigo)}</td>
      <td>${presG(cat,it)}</td>
      <td class="num">${num(it[cfg.orig])} <span class="muted" style="font-size:11px">${cfg.origUnit}</span></td>
      <td class="num muted">${num(it[cfg.origMin])}</td>
      <td class="num"><input class="n w-sm invconteo" data-conteo="bodega" value="${it.conteoBodega!==undefined?esc(it.conteoBodega):''}" placeholder="${num(it[cfg.orig])}"></td>
      <td class="num" data-diff>${diffCell(it.conteoBodega,it[cfg.orig])}</td>
      <td>${stateCell(it[cfg.orig],it[cfg.origMin])}</td>
      <td>${cadCell(it[cfg.cad])}</td>
      <td><div style="display:flex;gap:5px;align-items:center"><button class="btn ghost mini" data-act="kx" title="Ver kardex / movimientos">📜</button><button class="btn tr" data-act="tr" title="Traspasar a kiosko">⇄ Traspasar</button></div></td></tr>`).join("");
  } else if(invView==="kiosko"){
    head=`<th class="sticky">Producto</th><th>Categoría</th><th>Clave</th><th>Pres(g)</th><th class="num">Disponible</th><th class="num">Mín</th><th class="num">Conteo</th><th class="num">Dif.</th><th>Estado</th><th class="num">En bodega</th><th>Acción</th>`;
    bodyRows=rows.map(({cat,i,it,cfg,name})=>{const s=stockState(it[cfg.ind],it[cfg.indMin]);
      const needsRefill=(s.cls!=="ok")&&((+it[cfg.orig]||0)>0);
      return `<tr data-cat="${cat}" data-i="${i}">
      <td class="sticky">${esc(name)}</td><td class="muted">${CATLABEL[cat]}</td><td class="muted">${esc(it.codigo)}</td><td>${presG(cat,it)}</td>
      <td class="num">${num(it[cfg.ind])} <span class="muted" style="font-size:11px">${cfg.indUnit}</span></td>
      <td class="num muted">${num(it[cfg.indMin])}</td>
      <td class="num"><input class="n w-sm invconteo" data-conteo="kiosko" value="${it.conteoKiosko!==undefined?esc(it.conteoKiosko):''}" placeholder="${num(it[cfg.ind])}"></td>
      <td class="num" data-diff>${diffCell(it.conteoKiosko,it[cfg.ind])}</td>
      <td>${stateCell(it[cfg.ind],it[cfg.indMin])}</td>
      <td class="num muted">${num(it[cfg.orig])} ${cfg.origUnit}</td>
      <td><div style="display:flex;gap:5px;align-items:center"><button class="btn ghost mini" data-act="kx" title="Ver kardex / movimientos">📜</button><button class="btn tr ${needsRefill?"rep":""}" data-act="tr" title="Traer de bodega">⇄ ${needsRefill?"Reponer":"Traspasar"}</button></div></td></tr>`;}).join("");
  } else {
    head=`<th class="sticky">Producto</th><th>Categoría</th><th>Pres(g)</th><th class="num">Bodega</th><th class="num">Kiosko</th><th>Estado</th><th>Caducidad</th><th>Acción</th>`;
    bodyRows=rows.map(({cat,i,it,cfg,name})=>{const so=stockState(it[cfg.orig],it[cfg.origMin]),si=stockState(it[cfg.ind],it[cfg.indMin]);
      const worst=(so.cls==="bad"||si.cls==="bad")?{cls:"bad",txt:"Revisar"}:(so.cls==="warn"||si.cls==="warn")?{cls:"warn",txt:"Bajo"}:{cls:"ok",txt:"OK"};
      return `<tr data-cat="${cat}" data-i="${i}">
      <td class="sticky">${esc(name)}</td><td class="muted">${CATLABEL[cat]}</td><td>${presG(cat,it)}</td>
      <td class="num">${num(it[cfg.orig])} <span class="muted" style="font-size:11px">${cfg.origUnit}</span></td>
      <td class="num">${num(it[cfg.ind])} <span class="muted" style="font-size:11px">${cfg.indUnit}</span></td>
      <td><span class="statecell"><span class="dot ${worst.cls}"></span><span class="pill ${worst.cls}">${worst.txt}</span></span></td>
      <td>${cadCell(it[cfg.cad])}</td>
      <td><div style="display:flex;gap:5px;align-items:center"><button class="btn ghost mini" data-act="kx" title="Ver kardex / movimientos">📜</button><button class="btn tr" data-act="tr" title="Traspasar a kiosko">⇄ Traspasar</button></div></td></tr>`;}).join("");
  }
  body.innerHTML=kpis(rows)+`<div class="scroll"><table><thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table></div>
    <p class="legend"><span class="pill ok">OK</span> sobre el mínimo · <span class="pill warn">Bajo</span> en o bajo el mínimo · <span class="pill bad">Agotado</span> sin existencias. Caducidad: 🟡 ≤14 días o vencido.</p>`;
  body.querySelectorAll('[data-act="tr"]').forEach(b=>{const tr=b.closest("tr");b.onclick=()=>openTraspaso(tr.dataset.cat,+tr.dataset.i);});
  body.querySelectorAll('[data-act="kx"]').forEach(b=>{const tr=b.closest("tr");b.onclick=()=>openKardex(tr.dataset.cat,+tr.dataset.i);});
  body.querySelectorAll("[data-conteo]").forEach(inp=>{const tr=inp.closest("tr"),cat=tr.dataset.cat,i=+tr.dataset.i,which=inp.dataset.conteo;
    inp.addEventListener("input",e=>{const it=state[cat][i],cfg=INV[cat],field=which==="bodega"?"conteoBodega":"conteoKiosko";it[field]=e.target.value;

async function resolveInsumoIds(lines){

      });
      save();host.innerHTML="";render();
      if(subio.length)setTimeout(()=>alert("⚠️ Estos productos subieron de precio:\n\n• "+subio.join("\n• ")),120);
    }catch(e){showErr("No se guardó la entrada: "+(e.message||String(e)));}
    finally{const b=host.querySelector("#e_confirm");if(b){b.disabled=false;b.textContent="✓ Confirmar entrada";}}
  }
  draw();
}
function buySugerido(it,cfg){const exist=+it[cfg.stock]||0,min=+it[cfg.min]||0;return min>0?Math.max(0,Math.ceil(min*2-exist)):0;}
function openKardex(cat,i){
  const cfg=INV[cat],it=state[cat][i],name=cfg.name(it),host=document.getElementById("modalHost");
  const kx=Array.isArray(it.kardex)?it.kardex:[];
  let prev=null;const marked=kx.map(mv=>{let up=false;if(mv.tipo==="compra"&&mv.precio!==""&&mv.precio!=null){const pr=+mv.precio;if(prev!=null&&pr>prev)up=true;prev=pr;}return Object.assign({},mv,{_up:up});});
  const body=marked.length?marked.map(mv=>`<tr>
      <td>${esc(mv.f||"")}</td>
      <td><span class="kxtag ${mv.tipo||""}">${esc(mv.tipo||"")}</span></td>
      <td class="muted">${esc(mv.factura||mv.doc||"")}</td>
      <td class="num">${mv.ent?num(mv.ent):""}</td>
      <td class="num">${mv.sal?num(mv.sal):""}</td>
      <td class="num">${(mv.exist!==""&&mv.exist!=null)?num(mv.exist):""}</td>
      <td class="num">${(mv.precio!==""&&mv.precio!=null)?fmt(mv.precio)+(mv._up?' <span class="kxup" title="Subió de precio">▲</span>':''):""}</td>
      <td>${mv.cad?cadCell(mv.cad):'<span class="muted">—</span>'}</td>
      <td class="muted" style="font-size:11px">${esc(mv.nota||mv.pago||mv.prov||"")}</td></tr>`).join("")
    :`<tr><td colspan="9" class="muted" style="text-align:center;padding:14px">Aún no hay movimientos. Las <b>compras</b> (entradas por factura), <b>traspasos</b> a kiosko y <b>ajustes</b> de conteo aparecerán aquí.</td></tr>`;
  host.innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:840px">
    <h3>📜 Kardex · ${esc(name)}</h3>
    <div class="kxgen">
      <span><b>Categoría:</b> ${CATLABEL[cat]}</span><span><b>Clave:</b> ${esc(it.codigo||"—")}</span>
      <span><b>Proveedor:</b> ${esc(it.proveedor||"—")}</span><span><b>Presentación:</b> ${esc(invPres(cat,it))}</span>
      <span><b>Bodega:</b> ${num(it[cfg.orig])} ${cfg.origUnit}</span><span><b>Kiosko:</b> ${num(it[cfg.ind])} ${cfg.indUnit}</span>
      <span><b>Caducidad:</b> ${it[cfg.cad]?esc(it[cfg.cad]):"—"}</span>
    </div>
    <div class="scroll" style="max-height:50vh"><table><thead><tr>
      <th>Fecha</th><th>Tipo</th><th>Factura/Doc</th><th class="num">Entradas</th><th class="num">Salidas</th><th class="num">Existencia</th><th class="num">Precio</th><th>Caducidad</th><th>Nota</th>
    </tr></thead><tbody>${body}</tbody></table></div>
    <div class="mrow"><button class="btn ghost mini" id="kx_close">Cerrar</button><button class="btn mini" id="kx_print">🖨 Imprimir</button></div>
  </div></div>`;
  host.querySelector("#kx_close").onclick=()=>host.innerHTML="";
  host.querySelector("#kx_print").onclick=()=>window.print();
  host.querySelector(".modal-bg").onclick=ev=>{if(ev.target.classList.contains("modal-bg"))host.innerHTML="";};
}
function applyBuySearch(m){const q=(buyQ||"").toLowerCase().trim();
  m.querySelectorAll("tbody tr[data-cat]").forEach(tr=>{const cat=tr.dataset.cat,i=+tr.dataset.i,cfg=buyCfg(cat),it=state[cat]&&state[cat][i];if(!it||!cfg)return;
    const hay=[cfg.name(it),it.marca,it.codigoBarras,it.codigo,it[cfg.prov],cfg.pres(it),it.cont,it.unidad,it.pres,it.presCompra,it.presOriginal].map(x=>(x==null?"":String(x)).toLowerCase()).join(" ");
    tr.style.display=(!q||hay.indexOf(q)>=0)?"":"none";});
  m.querySelectorAll(".buygroup").forEach(g=>{const vis=[...g.querySelectorAll("tbody tr[data-cat]")].some(tr=>tr.style.display!=="none");g.style.display=vis?"":"none";});}
function renderCompras(m){
  const groups={};
  BUY.forEach(cfg=>(state[cfg.cat]||[]).forEach((it,i)=>{
    const exist=+it[cfg.stock]||0,min=+it[cfg.min]||0;
    if(buyOnlyLow && !(min>0&&exist<=min))return;
    const prov=(it[cfg.prov]||"").trim()||"Sin proveedor";
    (groups[prov]=groups[prov]||[]).push({cfg,it,i,name:cfg.name(it),exist,min,cost:+it[cfg.cost]||0,sugerido:buySugerido(it,cfg),unit:cfg.unit,pres:cfg.pres(it)});
  }));
  const provs=Object.keys(groups).sort((a,b)=>a.localeCompare(b,"es",{sensitivity:"base"}));
  let grand=0;
  const sections=provs.map(prov=>{const items=groups[prov];let sub=0;
    const rowsH=items.map(r=>{const buy=(r.it.comprar!==""&&r.it.comprar!=null&&r.it.comprar!==undefined)?+r.it.comprar:r.sugerido;const costo=buy*r.cost;sub+=costo;
      const lowc=r.min>0&&r.exist<=r.min;
      return `<tr data-cat="${r.cfg.cat}" data-i="${r.i}">
        <td class="sticky">${esc(r.name)}</td>
        <td class="muted">${esc(r.it.marca||'')}</td>
        <td class="muted">${esc(r.it.codigoBarras||'')}</td>
        <td class="muted">${esc(r.pres)}</td>
        <td class="num ${lowc?'lowc':''}">${num(r.exist)} <span class="muted" style="font-size:10px">${r.unit}</span></td>
        <td class="num muted">${num(r.min)}</td>
        <td class="num"><b>${num(r.sugerido)}</b></td>
        <td class="num"><input class="n w-sm buyc" data-buy value="${(r.it.comprar!==undefined&&r.it.comprar!=="")?esc(r.it.comprar):''}" placeholder="${r.sugerido}"></td>
        <td class="num muted">${fmt(costo)}</td></tr>`;}).join("");
    grand+=sub;
    return `<div class="buygroup"><div class="buyhead">🏷️ ${esc(prov)} <span class="muted" style="font-weight:400">· ${items.length} producto(s)</span><span class="buysub">${fmt(sub)}</span></div>
      <div class="scroll"><table><thead><tr><th class="sticky">Producto</th><th>Marca</th><th>Cód. barras</th><th>Presentación</th><th class="num">Existencia</th><th class="num">Mínimo</th><th class="num">Sugerido</th><th class="num">A comprar</th><th class="num">Costo aprox.</th></tr></thead><tbody>${rowsH}</tbody></table></div></div>`;
  }).join("");
  m.innerHTML=`<h2>Compras</h2>
    <p class="hint no-print">Existencias reales, mínimo y <b>sugerido a comprar</b> (para llegar al doble del mínimo). Solo la columna <b>A comprar</b> es editable; el resto se toma del inventario. Está dividida por proveedor y se puede imprimir.</p>
    <div class="printhead">🛒 Lista de compras · Shakeaholic · ${new Date().toLocaleDateString("es-MX")}</div>
    <div class="buyctrls no-print">
      <button class="btn" id="buyEntrada">📥 Dar entrada</button>
      <button class="btn ghost" id="buyHistorial">📋 Historial de entradas</button>
      <button class="btn ghost${buyOnlyLow?' on':''}" id="buyLow">${buyOnlyLow?'✓ ':''}🔴 Solo bajos</button>
      <button class="btn ghost" id="buyPrint">🖨 Imprimir</button>
      <button class="btn ghost" id="buyFill">Usar sugeridos</button>
      <button class="btn ghost" id="buyClear">Vaciar columna</button>
      <span class="grandtot">Total aprox.: <b>${fmt(grand)}</b></span>
    </div>
    <input class="ingsearch no-print" id="buySearch" placeholder="🔎 Buscar (producto, marca, código, presentación, g/L)…" value="${esc(buyQ)}" style="margin:0 0 12px">
    ${sections||(buyOnlyLow?'<div class="empty">No hay productos en nivel bajo. 🎉</div>':'<div class="empty">No hay productos con proveedor/inventario. Captura existencias y mínimos en los catálogos.</div>')}`;
  m.querySelectorAll("[data-buy]").forEach(inp=>{const tr=inp.closest("tr"),cat=tr.dataset.cat,i=+tr.dataset.i;
    inp.addEventListener("input",e=>{state[cat][i].comprar=e.target.value;save();});
    inp.addEventListener("change",()=>render());});
  m.querySelector("#buyEntrada").onclick=()=>openEntrada();
  m.querySelector("#buyHistorial").onclick=()=>openHistorialEntradas();
  m.querySelector("#buyLow").onclick=()=>{buyOnlyLow=!buyOnlyLow;render();};
  m.querySelector("#buyPrint").onclick=()=>window.print();
  m.querySelector("#buyFill").onclick=()=>{BUY.forEach(cfg=>(state[cfg.cat]||[]).forEach(it=>{const s=buySugerido(it,cfg);it.comprar=s?String(s):"";}));save();render();};
  m.querySelector("#buyClear").onclick=()=>{BUY.forEach(cfg=>(state[cfg.cat]||[]).forEach(it=>{it.comprar="";}));save();render();};
  const bs=m.querySelector("#buySearch");if(bs)bs.addEventListener("input",e=>{buyQ=e.target.value;applyBuySearch(m);});
  applyBuySearch(m);
}

/* ---------------- RESPALDO / CSV ---------------- */
function download(name,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}
function backup(){download(`shakeaholic_${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(state,null,2),"application/json");}
function exportCsv(){
  const rows=[["Tipo","Item","Producto","Costo total","Precio","Sin IVA","Food cost %","Margen $","Margen %","Precio ref."]];
  const push=(t,r,c)=>rows.push([t,r.codigo||"",r.nombre,c.total.toFixed(2),(c.precio||0).toFixed(2),c.sinIva.toFixed(2),(c.fc*100).toFixed(2),c.margen.toFixed(2),(c.margenPct*100).toFixed(2),round5(c.sugerido)]);
  state.shakeRecipes.forEach(r=>{const c=calcShake(r);if(c.precio>0)push("Shake",r,c);});
  state.foodRecipes.forEach(r=>{const c=calcFood(r);if(c.precio>0)push("Alimento",r,c);});
  const rs=(arr,t)=>arr.forEach(p=>{const precio=+p.precio||0;if(precio>0){const sin=precio/(1+state.params.iva);const mg=sin-(+p.costo||0);
    rows.push([t,p.codigo||"",p.nombre,(+p.costo||0).toFixed(2),precio.toFixed(2),sin.toFixed(2),((+p.costo||0)/sin*100).toFixed(2),mg.toFixed(2),(mg/sin*100).toFixed(2),""]);}});
  rs(state.bebidas,"Bebida");rs(state.snacks,"Snack/Treat");
  const csv="\ufeff"+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
  download(`shakeaholic_costeo_${new Date().toISOString().slice(0,10)}.csv`,csv,"text/csv;charset=utf-8");}
function csvOf(rows){return "\ufeff"+rows.map(r=>r.map(x=>`"${String(x==null?"":x).replace(/"/g,'""')}"`).join(",")).join("\n");}
function catalogoCsv(){
  const rows=[["Categoría","Producto","Marca","Clave","Cód. barras","Proveedor","Presentación","Contenido","Unidad","Costo","Precio","Existencia (bodega)","Mínimo","Existencia (kiosko)","Mín kiosko","Caducidad"]];
  const P=(c,n,it,o)=>rows.push([c,n,it.marca||"",it.codigo||"",it.codigoBarras||"",it.proveedor||"",o.pres||"",o.cont||"",o.unidad||"",o.costo||"",o.precio||"",o.stock||"",o.min||"",o.ind||"",o.indMin||"",o.cad||""]);
  (state.proteins||[]).forEach(p=>P("Proteína",protKey(p),p,{pres:p.pres?p.pres+" g":"",cont:p.pres,unidad:"g",costo:p.costo,precio:p.precioScoop,stock:p.invOriginal,min:p.minOriginal,ind:p.invScoops,indMin:p.minScoops,cad:p.fechaCaducidad}));
  (state.shakeIngs||[]).forEach(i=>P("Ingred. Shake",i.nombre,i,{pres:i.presCompra,cont:i.cont,unidad:i.unidad,costo:i.costo,precio:i.precioPorcion,stock:i.invOriginal,min:i.minOriginal,ind:i.invPorcion,indMin:i.minPorcion,cad:i.fechaCaducidad}));
  (state.foodIngs||[]).forEach(i=>P("Ingred. Alimento",i.nombre,i,{pres:i.presCompra,cont:i.cont,unidad:i.unidad,costo:i.costo,precio:i.precioPorcion,stock:i.invOriginal,min:i.minOriginal,ind:i.invPorcion,indMin:i.minPorcion,cad:i.fechaCaducidad}));
  (state.empaque||[]).forEach(e=>P("Empaque",e.nombre,e,{pres:e.presentacion||"",costo:e.costo,stock:e.stock,min:e.stockMin}));
  (state.bebidas||[]).forEach(b=>P("Bebida",b.nombre,b,{pres:b.presOriginal,cont:b.equivPiezas,unidad:"pz",costo:b.costoCaja,precio:b.precio,stock:b.invOriginal,min:b.minOriginal,ind:b.invIndividual,indMin:b.minIndividual,cad:b.caducidad}));
  (state.snacks||[]).forEach(s=>P("Snack/Treat",s.nombre,s,{pres:s.presOriginal,cont:s.equivPiezas,unidad:"pz",costo:s.costoCaja,precio:s.precio,stock:s.invOriginal,min:s.minOriginal,ind:s.invIndividual,indMin:s.minIndividual,cad:s.caducidad}));
  return csvOf(rows);}
function recetasCsv(){
  const rows=[["Tipo","Clave","Receta","Ingrediente","Cantidad"]];
  (state.shakeRecipes||[]).forEach(r=>{if(r.protein)rows.push(["Shake",r.codigo||"",r.nombre,"Proteína: "+r.protein,(r.scoops||1)+" scoop(s)"]);
    (r.ings||[]).forEach(p=>{if(p[0])rows.push(["Shake",r.codigo||"",r.nombre,p[0],p[1]||""]);});});
  (state.foodRecipes||[]).forEach(r=>(r.ings||[]).forEach(p=>{if(p[0])rows.push(["Alimento",r.codigo||"",r.nombre,p[0],p[1]||""]);}));
  return csvOf(rows);}
function kardexCsv(){
  const rows=[["Categoría","Producto","Fecha","Tipo","Factura","Entradas","Salidas","Existencia","Precio","Caducidad","Nota"]];
  Object.keys(INV).forEach(cat=>(state[cat]||[]).forEach(it=>{const nm=INV[cat].name(it);
    (it.kardex||[]).forEach(mv=>rows.push([CATLABEL[cat]||cat,nm,mv.f||"",mv.tipo||"",mv.factura||"",mv.ent||"",mv.sal||"",mv.exist||"",mv.precio||"",mv.cad||"",mv.nota||""]));}));
  return csvOf(rows);}
function backupAll(){
  const d=new Date(),stamp=d.toISOString().slice(0,10)+"_"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");
  download(`shakeaholic_RESPALDO_${stamp}.json`,JSON.stringify(state,null,2),"application/json");
  setTimeout(()=>download(`shakeaholic_catalogo_${stamp}.csv`,catalogoCsv(),"text/csv;charset=utf-8"),350);
  setTimeout(()=>download(`shakeaholic_recetas_${stamp}.csv`,recetasCsv(),"text/csv;charset=utf-8"),700);
  setTimeout(()=>download(`shakeaholic_kardex_${stamp}.csv`,kardexCsv(),"text/csv;charset=utf-8"),1050);
  setTimeout(()=>{setSaved("Respaldo descargado ✓");},1400);}
function restoreFrom(file){const fr=new FileReader();
  fr.onload=()=>{try{const data=JSON.parse(fr.result);if(!data||!data.params||!data.proteins)throw 0;state=migrate(data);persist();render();setSaved("Restaurado ✓");}
    catch(e){alert("El archivo no es un respaldo válido de este tablero.");}};
  fr.readAsText(file);}
function wireToolbar(){
  document.getElementById("tbBackupAll").onclick=backupAll;
  document.getElementById("tbBackup").onclick=backup;
  document.getElementById("tbCsv").onclick=exportCsv;
  document.getElementById("tbRestore").onclick=()=>document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange=e=>{if(e.target.files[0])restoreFrom(e.target.files[0]);e.target.value="";};
  document.getElementById("tbReset").onclick=()=>{
    if(!confirm("⚠️ Esto BORRA todos los datos y restaura el ejemplo.\n\nAntes de continuar te conviene usar 💾 Guardar TODO.\n\n¿Continuar?"))return;
    const k=prompt("Para borrar, escribe la clave del encargado:");
    if(k===null)return;
    if(k!==String(state.params.clave)){alert("Clave incorrecta. No se borró nada.");return;}
    state=defaultState();persist();render();};
  document.getElementById("logout").onclick=logout;}

/* ---------------- ARRANQUE ---------------- */
async function showApp(user){
  currentUser=user;
  document.getElementById("auth").style.display="none";document.getElementById("app").style.display="block";
  document.getElementById("userchip").textContent="👤 "+user;
  setSaved("Conectando…");
  await load();
  renderNav();wireToolbar();render();
  setSaved(sb?"Sincronizado ✓":"Local (sin nube)");
  subscribeRealtime();
}
function subscribeRealtime(){
  if(!sb||realtimeReady)return; realtimeReady=true;
  sb.channel('app_data_rt').on('postgres_changes',{event:'UPDATE',schema:'public',table:'app_data'},payload=>{
    const nd=payload.new&&payload.new.data;
    if(!nd||!nd.params)return;
    if(payload.new.updated_by===currentUser && (Date.now()-lastLocalSave<4000))return;
    const ae=document.activeElement;
    if(ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT"||ae.tagName==="TEXTAREA"))return;
    state=migrate(nd);lsSet(CACHE,state);render();setSaved("Actualizado desde otro dispositivo ✓");
  }).subscribe();
}
(async function(){
  await seedUsers();wireAuth();
  const sess=lsGet(SESS);
  if(sess&&sess.user)showApp(sess.user);
})();
